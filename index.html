<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tech Inventory Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a1a1a;
      --surface:    #242424;
      --row:        #2a2a2a;
      --row-border: #333;
      --text:       #e8e8e8;
      --muted:      #888;
      --accent:     #4ade80;
      --edit-bg:    #b5a642;
      --edit-hover: #cfc04a;
      --del-bg:     #c0392b;
      --del-hover:  #e74c3c;
      --radius:     12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 1200px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(26px, 4vw, 38px);
      letter-spacing: 0.08em;
      text-align: center;
      color: var(--text);
      margin-bottom: 40px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid #333;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }

    .table-header {
      display: grid;
      grid-template-columns: 120px 1fr 1.6fr 130px 90px 120px;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid #333;
    }

    .table-header span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .col-actions { display: flex; justify-content: flex-end; }

    .btn-add {
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 0 14px rgba(74,222,128,0.25);
    }
    .btn-add:hover  { background: #6ee7a0; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }
    .btn-add svg    { width: 14px; height: 14px; }

    .table-body { display: flex; flex-direction: column; }

    .table-row {
      display: grid;
      grid-template-columns: 120px 1fr 1.6fr 130px 90px 120px;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--row-border);
      background: var(--row);
      transition: background 0.15s;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover      { background: #303030; }

    .cell { font-size: 14px; color: var(--text); }

    .cell-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-icon {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.2s, transform 0.1s;
    }
    .btn-icon:hover  { filter: brightness(1.2); transform: translateY(-1px); }
    .btn-icon:active { transform: translateY(0); }
    .btn-icon svg    { width: 16px; height: 16px; }

    .btn-edit {
      background: var(--edit-bg);
      box-shadow: 0 3px 10px rgba(181,166,66,0.3);
    }
    .btn-delete {
      background: var(--del-bg);
      box-shadow: 0 3px 10px rgba(192,57,43,0.3);
    }

    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .empty-state svg { opacity: 0.3; }

    /* Modal Styles */
    .modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--surface);
      padding: 30px;
      border-radius: var(--radius);
      width: 100%;
      max-width: 400px;
      border: 1px solid #333;
      box-shadow: 0 8px 32px rgba(0,0,0,0.65);
    }
    .modal-content h2 { margin-bottom: 20px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; font-size: 28px; }
    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
    .form-group label { font-size: 13px; color: var(--muted); text-transform: uppercase; font-weight: 600; }
    .form-group input { 
      background: var(--bg); 
      border: 1px solid var(--row-border); 
      color: var(--text); 
      padding: 10px; 
      border-radius: 6px; 
      font-family: inherit; 
      outline: none;
    }
    .form-group input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
    .btn-save, .btn-cancel { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; }
    .btn-save { background: var(--accent); color: #111; transition: background 0.2s; }
    .btn-save:hover { background: #6ee7a0; }
    .btn-cancel { background: var(--row-border); color: var(--text); transition: background 0.2s; }
    .btn-cancel:hover { background: #444; }
  </style>
</head>
<body>
<div class="wrapper">
  <h1>Dessert Inventory Management System</h1>

  <div class="card">
    <div class="table-header">
      <span>ID</span>
      <span>Item</span>
      <span>Description</span>
      <span>Price (IDR)</span>
      <span>Stock</span>
      <span class="col-actions">
        <button class="btn-add" onclick="openAddModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          ADD NEW
        </button>
      </span>
    </div>

    <div class="table-body" id="tableBody">
      <div class="empty-state">
        Loading inventory data...
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div id="itemModal" class="modal">
  <div class="modal-content">
    <h2 id="modalTitle">Add Item</h2>
    <form id="itemForm">
      <input type="hidden" id="itemId">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="itemName" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="itemDesc" required>
      </div>
      <div class="form-group">
        <label>Price (IDR)</label>
        <input type="number" id="itemPrice" required>
      </div>
      <div class="form-group">
        <label>Stock</label>
        <input type="number" id="itemStock" required>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn-save">Save Item</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteModal" class="modal">
  <div class="modal-content">
    <h2 style="color: var(--del-hover);">Confirm Deletion</h2>
    <p style="margin-bottom: 20px; font-size: 15px; color: var(--text);">Are you sure you want to delete this item? This action cannot be undone.</p>
    <div class="modal-actions">
      <button type="button" class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button type="button" class="btn-save" style="background: var(--del-bg); color: #fff;" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
  // Point this to your FastAPI server
  const API_URL = "http://localhost:8000";
  let currentItems = []; // Global array to store fetched items

  async function loadItems() {
      const tableBody = document.getElementById('tableBody');
      try {
          const response = await fetch(`${API_URL}/items`);
          const items = await response.json();
          currentItems = items; // Store globally so we can access details for editing

          // Check if database is empty
          if (items.length === 0) {
              tableBody.innerHTML = `
                <div class="empty-state">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/>
                  </svg>
                  No inventory items yet. Click <strong style="color:var(--text)">&nbsp;+ ADD NEW&nbsp;</strong> to get started.
                </div>`;
              return;
          }

          // Clear the loading message
          tableBody.innerHTML = ''; 

          // Loop through the data and build the rows based on your CSS grid
          items.forEach(item => {
              // Grab the first 4 characters of the UUID so it looks like the mock-up
              const shortId = item.id.substring(0, 6).toUpperCase();
              
              // Format the price with 2 decimal places to match your mockup
              const formattedPrice = Number(item.price).toFixed(2);

          // Reduce the item name length if it's too long
          const shortName = item.name.length > 20 ? item.name.substring(0, 20) + '...' : item.name;

              const row = `
                  <div class="table-row">
                    <div class="cell" style="font-weight: 700;">${shortId}</div>
                <div class="cell" style="font-weight: 600;" title="${item.name}">${shortName}</div>
                    <div class="cell" style="font-size: 13px;">${item.description}</div>
                    <div class="cell" style="font-weight: 700;">${formattedPrice}</div>
                    <div class="cell" style="font-weight: 700;">${item.stock}</div>
                    <div class="cell cell-actions">
                      <button class="btn-icon btn-edit" onclick="openEditModal('${item.id}')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                      </button>
                      <button class="btn-icon btn-delete" onclick="openDeleteModal('${item.id}')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <polyline points="3 6 5 6 21 6"></polyline>
                          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                          <line x1="10" y1="11" x2="10" y2="17"></line>
                          <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                      </button>
                    </div>
                  </div>
              `;
              tableBody.innerHTML += row;
          });
      } catch (error) {
          console.error("Error loading items:", error);
          tableBody.innerHTML = `
            <div class="empty-state" style="color: var(--del-hover);">
              Could not connect to the database. Is FastAPI running?
            </div>`;
      }
  }

  // Modal Functions
  function openAddModal() {
      document.getElementById('itemForm').reset();
      document.getElementById('itemId').value = '';
      document.getElementById('modalTitle').innerText = 'Add New Item';
      document.getElementById('itemModal').style.display = 'flex';
  }

  function openEditModal(id) {
      const item = currentItems.find(i => i.id === id);
      if (!item) return;
      
      document.getElementById('itemId').value = item.id;
      document.getElementById('itemName').value = item.name;
      document.getElementById('itemDesc').value = item.description;
      document.getElementById('itemPrice').value = item.price;
      document.getElementById('itemStock').value = item.stock;
      
      document.getElementById('modalTitle').innerText = 'Edit Item';
      document.getElementById('itemModal').style.display = 'flex';
  }

  function closeModal() {
      document.getElementById('itemModal').style.display = 'none';
  }

  // Form Submit Handler (Creates or Updates)
  document.getElementById('itemForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('itemId').value;
      const payload = {
          name: document.getElementById('itemName').value,
          description: document.getElementById('itemDesc').value,
          price: parseInt(document.getElementById('itemPrice').value),
          stock: parseInt(document.getElementById('itemStock').value)
      };

      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API_URL}/item/${id}` : `${API_URL}/item`;

      try {
          const response = await fetch(url, {
              method: method,
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
          });
          if (response.ok) {
              closeModal();
              loadItems(); // Refresh the table
          } else {
              alert('Failed to save item');
          }
      } catch (error) {
          console.error("Error saving item:", error);
      }
  });

  // Delete Modal Functions
  let itemToDelete = null;

  function openDeleteModal(id) {
      itemToDelete = id;
      document.getElementById('deleteModal').style.display = 'flex';
  }

  function closeDeleteModal() {
      itemToDelete = null;
      document.getElementById('deleteModal').style.display = 'none';
  }

  async function confirmDelete() {
      if (!itemToDelete) return;
      try {
          await fetch(`${API_URL}/item/${itemToDelete}`, { method: 'DELETE' });
          closeDeleteModal();
          loadItems(); // Refresh the table
      } catch (error) {
          console.error("Error deleting item:", error);
      }
  }

  // Run the data fetch as soon as the page loads
  window.onload = loadItems;
</script>

</body>
</html>
