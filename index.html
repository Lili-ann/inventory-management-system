<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tech Inventory Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #1a1a1a;
      --surface:    #242424;
      --row:        #2a2a2a;
      --row-border: #333;
      --text:       #e8e8e8;
      --muted:      #888;
      --accent:     #4ade80;
      --edit-bg:    #b5a642;
      --edit-hover: #cfc04a;
      --del-bg:     #c0392b;
      --del-hover:  #e74c3c;
      --radius:     12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 900px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(26px, 4vw, 38px);
      letter-spacing: 0.08em;
      text-align: center;
      color: var(--text);
      margin-bottom: 40px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid #333;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }

    .table-header {
      display: grid;
      grid-template-columns: 80px 1fr 1.6fr 130px 90px 120px;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid #333;
    }

    .table-header span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .col-actions { display: flex; justify-content: flex-end; }

    .btn-add {
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 0 14px rgba(74,222,128,0.25);
    }
    .btn-add:hover  { background: #6ee7a0; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }
    .btn-add svg    { width: 14px; height: 14px; }

    .table-body { display: flex; flex-direction: column; }

    .table-row {
      display: grid;
      grid-template-columns: 80px 1fr 1.6fr 130px 90px 120px;
      align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid var(--row-border);
      background: var(--row);
      transition: background 0.15s;
    }
    .table-row:last-child { border-bottom: none; }
    .table-row:hover      { background: #303030; }

    .cell { font-size: 14px; color: var(--text); }

    .cell-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-icon {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.2s, transform 0.1s;
    }
    .btn-icon:hover  { filter: brightness(1.2); transform: translateY(-1px); }
    .btn-icon:active { transform: translateY(0); }
    .btn-icon svg    { width: 16px; height: 16px; }

    .btn-edit {
      background: var(--edit-bg);
      box-shadow: 0 3px 10px rgba(181,166,66,0.3);
    }
    .btn-delete {
      background: var(--del-bg);
      box-shadow: 0 3px 10px rgba(192,57,43,0.3);
    }

    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .empty-state svg { opacity: 0.3; }
  </style>
</head>
<body>
<div class="wrapper">
  <h1>Tech Inventory Management System</h1>

  <div class="card">
    <div class="table-header">
      <span>ID</span>
      <span>Item</span>
      <span>Description</span>
      <span>Price (IDR)</span>
      <span>Stock</span>
      <span class="col-actions">
        <button class="btn-add" onclick="alert('Add modal coming soon!')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          ADD NEW
        </button>
      </span>
    </div>

    <div class="table-body" id="tableBody">
      <div class="empty-state">
        Loading inventory data...
      </div>
    </div>
  </div>
</div>

<script>
  // Point this to your FastAPI server
  const API_URL = "http://localhost:8000";

  async function loadItems() {
      const tableBody = document.getElementById('tableBody');
      try {
          const response = await fetch(`${API_URL}/items`);
          const items = await response.json();

          // Check if database is empty
          if (items.length === 0) {
              tableBody.innerHTML = `
                <div class="empty-state">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round"/>
                  </svg>
                  No inventory items yet. Click <strong style="color:var(--text)">&nbsp;+ ADD NEW&nbsp;</strong> to get started.
                </div>`;
              return;
          }

          // Clear the loading message
          tableBody.innerHTML = ''; 

          // Loop through the data and build the rows based on your CSS grid
          items.forEach(item => {
              // Grab the first 4 characters of the UUID so it looks like the mock-up
              const shortId = item.id.substring(0, 4).toUpperCase();
              
              // Format the price with 2 decimal places to match your mockup
              const formattedPrice = Number(item.price).toFixed(2);

              const row = `
                  <div class="table-row">
                    <div class="cell" style="font-weight: 700;">${shortId}</div>
                    <div class="cell" style="text-transform: uppercase; font-weight: 600;">${item.name}</div>
                    <div class="cell" style="text-transform: uppercase; font-size: 13px;">${item.description}</div>
                    <div class="cell" style="font-weight: 700;">${formattedPrice}</div>
                    <div class="cell" style="font-weight: 700;">${item.stock}</div>
                    <div class="cell cell-actions">
                      <button class="btn-icon btn-edit" onclick="alert('Edit item ${shortId} coming soon!')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                      </button>
                      <button class="btn-icon btn-delete" onclick="alert('Delete item ${shortId} coming soon!')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <polyline points="3 6 5 6 21 6"></polyline>
                          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                          <line x1="10" y1="11" x2="10" y2="17"></line>
                          <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                      </button>
                    </div>
                  </div>
              `;
              tableBody.innerHTML += row;
          });
      } catch (error) {
          console.error("Error loading items:", error);
          tableBody.innerHTML = `
            <div class="empty-state" style="color: var(--del-hover);">
              Could not connect to the database. Is FastAPI running?
            </div>`;
      }
  }

  // Run the data fetch as soon as the page loads
  window.onload = loadItems;
</script>

</body>
</html>
