
services:
  postgres_db:
    image: postgres
    container_name: inventory_postgres
    restart: always
    environment:
      POSTGRES_USER: lili
      POSTGRES_PASSWORD: lilian17
      POSTGRES_DB: inventory_db
    ports:
      - "5422:5432"
 

  mongo_db:
    image: mongo:latest
    container_name: inventory_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: lili
      MONGO_INITDB_ROOT_PASSWORD: lilian17
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  fastapi-app:
    build: .                 
    container_name: inventory_api
    ports:
      - "8000:8000"          
    depends_on:
      - postgres_db             
      - mongo_db


# This is to ensure my data isn't deleted if the container stops
volumes:
  pgdata:
  mongodata:
